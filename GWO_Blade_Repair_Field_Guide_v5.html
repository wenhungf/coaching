<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GWO Blade Repair — Interpreter's Field Guide</title>
<style>
  :root{
    --paper:#EBEEED; --surface:#FFFFFF; --surface-2:#F5F8F7;
    --ink:#14201C; --muted:#5A6762; --hairline:#D2DAD7; --hairline-strong:#B9C3BF;
    --theory:#1E5F78; --theory-soft:#E4EEF2;
    --practical:#AF5220; --practical-soft:#F6E9E1;
    --source:#5B6E2E; --source-soft:#EBF0DF;
    --signal:#C9891A; --focus:#1E5F78;
    --mono: ui-monospace,"SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
    --sans: system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    --han: "Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;
    font-feature-settings:"kern" 1;text-rendering:optimizeLegibility}
  a{color:inherit}
  :focus-visible{outline:2.5px solid var(--focus);outline-offset:2px;border-radius:3px}

  header.top{position:sticky;top:0;z-index:20;background:var(--ink);color:#EEF2F0;border-bottom:1px solid #0c1512}
  .top-inner{max-width:1000px;margin:0 auto;padding:0 18px}
  .brandrow{display:flex;align-items:center;gap:14px;height:58px}
  .mark{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;min-width:0}
  .mark svg{flex:none;display:block}
  .mark .code{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:#8FB6C4;
    border:1px solid #35494f;padding:3px 7px;border-radius:4px;white-space:nowrap}
  .mark .titles{min-width:0}
  .mark .t1{font-weight:650;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mark .t2{font-family:var(--han);font-size:11.5px;color:#93A39D;margin-top:1px}
  .rev{margin-left:auto;font-family:var(--mono);font-size:11px;color:#7f938c;white-space:nowrap}

  .ctx{background:var(--surface);border-bottom:1px solid var(--hairline)}
  .ctx-inner{max-width:1000px;margin:0 auto;padding:0 18px;min-height:52px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}

  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--hairline-strong);border-radius:9px;padding:3px}
  .seg button{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:0;
    padding:7px 13px;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s,color .15s}
  .seg button .n{font-family:var(--mono);font-size:10.5px;opacity:.7}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff}
  .seg button[aria-pressed="true"] .n{opacity:.6}

  .search{position:relative;margin-left:auto;flex:1 1 220px;max-width:340px;min-width:180px}
  .search input{width:100%;font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--surface-2);
    border:1px solid var(--hairline-strong);border-radius:9px;padding:9px 32px 9px 34px}
  .search input::placeholder{color:#93a09b}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.5}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:transparent;cursor:pointer;
    color:var(--muted);font-size:17px;line-height:1;padding:2px 5px;border-radius:5px;display:none}
  .search .clr.show{display:block}

  .back{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-size:13.5px;font-weight:600;color:var(--theory);
    padding:7px 12px 7px 9px;border:1px solid var(--hairline-strong);border-radius:9px;background:var(--surface-2)}
  .back:hover{background:#eef3f2}
  .crumb{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;min-width:0}
  .crumb .sep{color:var(--hairline-strong)}
  .crumb .here{color:var(--ink);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crumb .code{font-family:var(--mono);font-size:12px}

  main{max-width:1000px;margin:0 auto;padding:26px 18px 90px}
  .lede{margin:2px 0 24px;max-width:72ch}
  .lede h1{font-size:22px;letter-spacing:-.015em;margin:0 0 6px}
  .lede p{margin:0;color:var(--muted);font-size:14.5px}

  .group{margin:34px 0 12px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .group:first-of-type{margin-top:6px}
  .group .idx{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--hairline-strong);
    border-radius:5px;padding:2px 8px;letter-spacing:.06em}
  .group h2{font-size:15px;letter-spacing:.02em;text-transform:uppercase;margin:0}
  .group .zh{font-family:var(--han);font-size:13px;color:var(--muted);font-weight:500}
  .group .meta{margin-left:auto;font-size:12.5px;color:var(--muted);font-family:var(--mono)}
  .group.theory .idx{color:var(--theory);border-color:#a9cad6}
  .group.practical .idx{color:var(--practical);border-color:#e0bda8}

  .rows{display:grid;gap:8px}
  a.row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;text-decoration:none;
    background:var(--surface);border:1px solid var(--hairline);border-radius:11px;padding:13px 15px;
    transition:border-color .14s,transform .14s,box-shadow .14s}
  a.row:hover{border-color:var(--hairline-strong);transform:translateY(-1px);box-shadow:0 4px 14px -8px rgba(20,32,28,.28)}
  .chip{font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.02em;padding:5px 9px;border-radius:7px;
    white-space:nowrap;border:1px solid transparent}
  .chip.T{color:var(--theory);background:var(--theory-soft);border-color:#cfe2e9}
  .chip.P{color:var(--practical);background:var(--practical-soft);border-color:#ecd6c6}
  .chip.S{color:var(--source);background:var(--source-soft);border-color:#d4dfbf}
  .row .body{min-width:0}
  .row .ttl{font-size:14.5px;font-weight:600;letter-spacing:-.005em;line-height:1.35}
  .row .sub{font-size:12.5px;color:var(--muted);margin-top:3px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .row .tag{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;border:1px solid var(--hairline);border-radius:6px;padding:3px 8px}
  .row .tag.theory{color:var(--theory)} .row .tag.practical{color:var(--practical)} .row .tag.src{color:var(--source)}

  .empty{background:var(--surface);border:1px dashed var(--hairline-strong);border-radius:12px;padding:26px;text-align:center;color:var(--muted);font-size:14px}

  .termhead{font-size:13px;color:var(--muted);margin:4px 0 10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .terms{display:grid;gap:7px;margin-bottom:26px}
  a.term{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;text-decoration:none;background:var(--surface);
    border:1px solid var(--hairline);border-radius:10px;padding:11px 14px}
  a.term:hover{border-color:var(--hairline-strong)}
  .term .en{font-weight:600;font-size:14px}
  .term .zh{font-family:var(--han);color:var(--theory);font-size:14px;margin-left:8px}
  .term .def{font-size:12.5px;color:var(--muted);margin-top:3px}
  .term .loc{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  mark{background:#fbe7b3;color:inherit;border-radius:2px;padding:0 1px}

  .detail-head{border-bottom:1px solid var(--hairline);padding-bottom:20px;margin-bottom:6px}
  .detail-head .kicker{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .detail-head .day{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--hairline-strong);border-radius:6px;padding:3px 9px}
  .detail-head h1{font-size:24px;letter-spacing:-.02em;line-height:1.2;margin:0;max-width:36ch}
  .detail-head .summary{margin:14px 0 0;font-size:15.5px;color:#2c3a35;max-width:66ch;line-height:1.55}

  .xref{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:16px}
  .xref .lbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  a.pill{text-decoration:none;font-family:var(--mono);font-size:12px;font-weight:600;padding:4px 9px;border-radius:7px;border:1px solid transparent;white-space:nowrap}
  a.pill.S{color:var(--source);background:var(--source-soft);border-color:#d4dfbf}
  a.pill.T{color:var(--theory);background:var(--theory-soft);border-color:#cfe2e9}
  a.pill.P{color:var(--practical);background:var(--practical-soft);border-color:#ecd6c6}
  a.pill:hover{filter:brightness(.97)}
  a.pill .nm{font-family:var(--sans);font-weight:500;color:var(--muted);margin-left:2px}

  section.block{margin-top:34px}
  .block > h3{display:flex;align-items:center;gap:10px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 14px}
  .block > h3::after{content:"";flex:1;height:1px;background:var(--hairline)}
  .block > h3 .zh{font-family:var(--han);font-weight:500;text-transform:none;letter-spacing:0}

  .gloss{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);border:1px solid var(--hairline);
    border-radius:12px;overflow:hidden;font-size:14px}
  .gloss thead th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:left;font-weight:600;
    padding:10px 14px;background:var(--surface-2);border-bottom:1px solid var(--hairline)}
  .gloss td{padding:11px 14px;border-bottom:1px solid var(--hairline);vertical-align:top}
  .gloss tr:last-child td{border-bottom:0}
  .gloss td.en{font-weight:600;width:30%}
  .gloss td.zh{font-family:var(--han);color:var(--theory);width:22%;font-weight:500}
  .gloss td.def{color:var(--muted);font-size:13px}
  .gloss tbody tr:hover{background:#fafcfb}

  .qa-grid{display:grid;gap:16px}
  @media(min-width:720px){.qa-grid{grid-template-columns:1fr 1fr}}
  .qcard{background:var(--surface);border:1px solid var(--hairline);border-radius:12px;padding:16px 18px}
  .qcard h4{margin:0 0 4px;font-size:14px;display:flex;align-items:center;gap:8px}
  .qcard .dir{font-family:var(--mono);font-size:11px;padding:3px 7px;border-radius:5px}
  .qcard.ask h4 .dir{background:var(--theory-soft);color:var(--theory)}
  .qcard.get h4 .dir{background:var(--practical-soft);color:var(--practical)}
  .qcard .zhlead{font-family:var(--han);font-size:12px;color:var(--muted);margin:0 0 12px}
  .qcard ol{margin:0;padding-left:1.15em;display:grid;gap:12px}
  .qcard li{font-size:14px;line-height:1.5;padding-left:3px}
  .qcard li::marker{color:var(--muted);font-family:var(--mono);font-size:12px}
  .qcard li .zh{display:block;font-family:var(--han);font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5}

  .prevnext{display:flex;gap:10px;margin-top:40px;padding-top:22px;border-top:1px solid var(--hairline)}
  a.pn{flex:1;text-decoration:none;background:var(--surface);border:1px solid var(--hairline);border-radius:11px;padding:12px 15px;transition:border-color .14s}
  a.pn:hover{border-color:var(--hairline-strong)}
  a.pn.next{text-align:right}
  a.pn .lbl{font-family:var(--mono);font-size:11px;color:var(--muted)}
  a.pn .nm{font-size:13.5px;font-weight:600;margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  a.pn.disabled{opacity:.4;pointer-events:none}

  footer.foot{max-width:1000px;margin:0 auto;padding:24px 18px 40px;color:var(--muted);font-size:12px}
  footer.foot .han{font-family:var(--han)}

  @media(max-width:600px){
    .brandrow{height:52px} .mark .t2{display:none}
    .search{order:3;flex-basis:100%;max-width:none;margin:0 0 12px}
    .ctx-inner{padding-top:12px;padding-bottom:4px}
    .gloss td.def{display:none} .gloss td.en,.gloss td.zh{width:auto}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<script>
/* ============================ LESSON DATA ============================ */
/* gloss: [en, zh, context] ; ask/get: [en, zh] ; src: PPT section ids */
const LESSONS = [
/* ---- DAY 1 ---- */
{id:"T1",type:"theory",day:1,src:["S1"],title:"Introduction and Course Summary, Tour of Facilities",
 summary:"Opens the ten-day course: GWO's mission and the scope/learning objectives of the module, enrolment, assessment methods and appeal procedures, site orientation and emergency routes, and the human factors behind wind-industry accidents.",
 gloss:[
  ["GWO (Global Wind Organisation)","全球風能組織","Association of turbine owners and manufacturers aiming for an injury-free wind industry."],
  ["Blade Repair (BR) module","葉片維修模組","The GWO training module delivered by this course."],
  ["Learning objective","學習目標","What a trainee will be able to do on completion."],
  ["Scope","課程範疇","The aims and boundaries of the module."],
  ["Assessment methods","評估方法","How competence is measured — continuous assessment plus a test."],
  ["Appeal procedure","申訴程序","Route to challenge an assessment result."],
  ["Special considerations","特殊考量","Adjustments for individual trainee needs."],
  ["WINDA ID","WINDA 識別碼","GWO training-record identifier checked at registration."],
  ["Muster point","緊急集合點","Safe assembly area to move to in an emergency."],
  ["Fire alarm / break-glass point","火災警報器","Manual call point to raise the alarm."],
  ["First aid / Defibrillator (AED)","急救箱／AED","On-site emergency medical equipment."],
  ["Certificate without expiry","無效期證照","GWO BR certificate has no fixed expiry date."],
  ["Human factor","人為因素","Conditions (fatigue, peer pressure, weather) that raise accident risk."]],
 ask:[
  ["What do you already know about working on rotor blades?","你對葉片維修工作已經有哪些認識？"],
  ["Where is the muster point for this facility?","本場地的緊急集合點在哪裡？"],
  ["What is the main objective of the GWO Blade Repair module?","GWO 葉片維修模組的主要目標是什麼？"],
  ["Why does GWO standardise training across the industry?","GWO 為什麼要在整個產業推行標準化訓練？"],
  ["Can you name three human factors that influence accidents?","你能舉出三個影響事故的人為因素嗎？"],
  ["What will this course NOT make you — a fully independent technician?","本課程無法讓你成為什麼——一位完全獨立作業的技術人員嗎？"],
  ["What are your own expectations from these ten days?","你對這十天課程有什麼期望？"],
  ["Why is personal involvement important to your learning outcome?","為什麼親身參與對你的學習成果很重要？"]],
 get:[
  ["Does the GWO certificate have an expiry date?","GWO 證照有效期嗎？"],
  ["How is the final assessment structured?","期末評估是如何安排的？"],
  ["What is the appeal procedure if I disagree with a result?","如果我不同意評估結果，申訴程序是什麼？"],
  ["Where are the toilets, break areas and first-aid points?","洗手間、休息區和急救點在哪裡？"],
  ["What do I do if the fire alarm sounds during the course?","上課期間若火警響起，我該怎麼辦？"],
  ["Is there a weight limit for the practical training?","實作訓練有體重限制嗎？"],
  ["What experience level is expected before this course?","上這門課之前需要什麼程度的經驗？"],
  ["Will I be able to work independently after the course?","結訓後我能獨立作業嗎？"]]},

{id:"T2",type:"theory",day:1,src:["S2"],title:"Basics of Rotor Blade Design, Structure and Materials",
 summary:"Introduces blade anatomy from root to tip, the two main structural families (structural vs non-structural shell), the internal load-bearing components, and how to define positions on a blade for measuring damage.",
 gloss:[
  ["Rotor blade","轉子葉片","The aerofoil that captures wind energy."],
  ["Leading edge","前緣","Forward edge meeting the wind first; most erosion-prone."],
  ["Trailing edge","後緣","Rear edge where the shells meet; thin, prone to bond-line failure."],
  ["Root / Tip","根部／葉尖","Thick hub-connection base vs the outer end of the blade."],
  ["Chord / Maximum chord","弦長／最寬處","Width of the blade section; its widest point."],
  ["Suction side (leeward)","吸力面（背風側）","Low-pressure aerodynamic surface."],
  ["Pressure side (windward)","壓力面（迎風側）","High-pressure aerodynamic surface."],
  ["Sparcap / Spar","翼樑帽／翼樑","Main load-bearing spine along the blade centre."],
  ["Shear web","抗剪腹板","Links sparcaps to stop them collapsing — forms an “I-beam”."],
  ["Structural shell","結構殼","Load carried in the outer shell (GE, Enercon, Nordex)."],
  ["Non-structural shell / Box-spar","非結構殼／箱形樑","Aerodynamic shell around an internal box-spar (Vestas, Gamesa)."],
  ["Bulkhead","隔板","Internal partition within the blade."],
  ["Bond line","黏合線","Glued joint between blade halves/parts."],
  ["Prebend","預彎","Built-in curvature so a loaded blade clears the tower."],
  ["Radius measurement","半徑量測","Positions defined by distance from root; used to locate damage."]],
 ask:[
  ["Can you name the parts of a blade from root to tip?","你能從根部到葉尖說出葉片各部位嗎？"],
  ["What is the job of the sparcap?","翼樑帽的功能是什麼？"],
  ["Why do the shear webs form an “I-beam”?","抗剪腹板為什麼要形成「工字樑」結構？"],
  ["How do structural and non-structural shell blades differ?","結構殼與非結構殼葉片有什麼不同？"],
  ["Which is the suction side and which the pressure side?","哪一面是吸力面，哪一面是壓力面？"],
  ["How do you use radius measurements to locate damage?","你如何用半徑量測來定位損傷位置？"],
  ["Why does the blade need prebend?","葉片為什麼需要預彎？"],
  ["What is the function of the core material in a shell?","殼體中芯材的功能是什麼？"]],
 get:[
  ["How long is a typical modern blade?","現代葉片一般有多長？"],
  ["Which manufacturers use which structure type?","哪些製造商使用哪一種結構型式？"],
  ["Where does the blade carry most of its load?","葉片的主要載荷集中在哪裡？"],
  ["How do I know if I'm on a structural or non-structural blade?","我怎麼判斷手上是結構殼還是非結構殼葉片？"],
  ["What are the bolts at the root for?","根部的螺栓是做什麼用的？"],
  ["How precise does a radius measurement need to be?","半徑量測需要多精確？"],
  ["Does prebend change how I set up rope access?","預彎會影響繩索作業的架設方式嗎？"],
  ["Why does damage location matter for the repair method?","損傷位置為什麼會影響修復方法？"]]},

{id:"T3",type:"theory",day:1,src:["S2","S3"],title:"Introduction to Manufacturing Technology and Production Processes",
 summary:"How blades are made: Type A open-mould production (heated, computer-controlled, ~48 h per blade) versus Type B inflatable-bag construction that avoids bond lines — and why the build method matters for repair.",
 gloss:[
  ["Manufacturing Type A","製造方法 A","Open heated moulds, materials added and infused, then bonded — most manufacturers."],
  ["Manufacturing Type B","製造方法 B","Inflatable-bag build, infused in one piece — the Siemens route, no bond lines."],
  ["Mould","模具","Heated, computer-controlled tool the blade is formed in."],
  ["Hydraulic hinge","液壓鉸鏈","Closes the heavy mould halves."],
  ["Mandrel","芯軸","Holds the internal structure against the shell during cure (Type B)."],
  ["Resin infusion","樹脂灌注","Vacuum-driven resin flow for void-free laminate."],
  ["Bond line","黏合線","Glued joint between blade halves; avoided in Type B."],
  ["Wet lamination","濕式層壓","Applying liquid resin to dry fabric by hand."]],
 ask:[
  ["Why does the Type B process avoid bond lines?","B 型製程為什麼能避免黏合線？"],

  ["Shore D hardness","Shore D 硬度","Complementary hardness/cure check."],
  ["Glass transition temperature (Tg)","玻璃轉化溫度","Indirect measure of degree of cure."],
  ["Thermocouple thermometer","熱電偶溫度計","Measures repair temperature."],
  ["Temperature / humidity data logger","溫濕度數據記錄儀","Records ambient/cure conditions."],
  ["Heating blanket (0–120 °C)","加熱毯","Heats a repair; fix with strap/tape, monitor for fire."],
  ["Thermostat / Ratchet strap","恆溫器／棘輪帶","Controls temperature; fixes the blanket."],
  ["Vacuum pump / Resin trap","真空泵／樹脂收集器","Draws vacuum; protects the pump from resin."],
  ["Pneumatic / Manual glue gun","氣動／手動膠槍","Dispenses cartridge adhesive."],
  ["RCD / GFCI (residual current device)","漏電斷路器","Life-saving cutout for electric shock/fire."],
  ["Voltage check (110 / 230 V)","電壓檢查","Match tool to the supply."],
  ["Photo card","照片卡","Reference in damage/repair photos."],
  ["Inspection / repair report","檢查／修復報告","Documentation of findings and work."],
  ["Bill of materials","材料清單","List of materials for the repair."]]}
];

const DAY_TITLES={
 1:["Foundations & first layups","基礎與初次疊層"],
 2:["Documentation & vacuum processing","文件與真空製程"],
 3:["Cores & cutting/grinding","芯材與切割研磨"],
 4:["Bonding, coating & inspection tools","黏合、塗裝與檢查工具"],
 5:["Leading edge, damage & reporting","前緣、損傷與報告"],
 6:["Inspection & repair-method decisions","檢查與修復方法判斷"],
 7:["Section repairs & complex/lightning","區段修復與複雜/雷擊損傷"],
 8:["Quality review & in-situ / large repairs","品質審查與現場／大型修復"],
 9:["Testing (Tg), environment & large repairs","測試(Tg)、環境與大型修復"],
 10:["Rope-access finishing & final exam","繩索作業修飾與期末考"]
};
/* ============================ APP ============================ */
const byId={}; LESSONS.forEach(l=>byId[l.id]=l);
const secById={}; SECTIONS.forEach(s=>secById[s.id]=s);
const ORDER=LESSONS.map(l=>l.id);
const view=document.getElementById('view');
const ctx=document.getElementById('ctx');
let state={mode:'day',query:''};

const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const typeLabel=t=>t==='theory'?'Theory':'Practical';
const zhType=t=>t==='theory'?'理論':'實作';

function hi(text,q){
  if(!q) return esc(text);
  const t=esc(text), needle=esc(q);
  const i=t.toLowerCase().indexOf(needle.toLowerCase());
  if(i<0) return t;
  return t.slice(0,i)+'<mark>'+t.slice(i,i+needle.length)+'</mark>'+t.slice(i+needle.length);
}

/* -------- context bar -------- */
function renderCtxHome(){
  ctx.innerHTML=`
    <div class="seg" role="tablist" aria-label="View">
      <button role="tab" data-mode="day" aria-pressed="${state.mode==='day'}">By day <span class="n">1–10</span></button>
      <button role="tab" data-mode="type" aria-pressed="${state.mode==='type'}">By type <span class="n">T·P</span></button>
      <button role="tab" data-mode="ppt" aria-pressed="${state.mode==='ppt'}">By PPT <span class="n">§1–15</span></button>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <input id="q" type="search" placeholder="Search lessons, sections or terms…  搜尋課程、章節或術語" value="${esc(state.query)}" aria-label="Search">
      <button class="clr ${state.query?'show':''}" id="clr" aria-label="Clear search">×</button>
    </div>`;
  ctx.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;location.hash='#/'+state.mode;});
  const q=document.getElementById('q'), clr=document.getElementById('clr');
  q.addEventListener('input',()=>{state.query=q.value;clr.classList.toggle('show',!!q.value);renderList();});
  clr.onclick=()=>{state.query='';q.value='';clr.classList.remove('show');renderList();q.focus();};
}
function backHash(){return '#/'+(state.mode==='ppt'||state.mode==='type'?state.mode:'day');}
function renderCtxDetailLesson(l){
  ctx.innerHTML=`
    <a class="back" href="${backHash()}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
      All lessons</a>
    <div class="crumb"><span>Day ${l.day}</span><span class="sep">/</span>
      <span class="code" style="color:var(--${l.type})">${l.id}</span><span class="sep">/</span>
      <span class="here">${esc(l.title)}</span></div>`;
}
function renderCtxDetailSection(s){
  ctx.innerHTML=`
    <a class="back" href="#/ppt">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
      All sections</a>
    <div class="crumb"><span>PPT</span><span class="sep">/</span>
      <span class="code" style="color:var(--source)">${s.id}</span><span class="sep">/</span>
      <span class="here">${esc(s.title)}</span></div>`;
}

/* -------- rows -------- */
function rowHTML(l,q){
  return `<a class="row" href="#/lesson/${l.id}">
    <span class="chip ${l.type[0].toUpperCase()}">${l.id}</span>
    <span class="body"><span class="ttl">${hi(l.title,q)}</span><span class="sub">${hi(l.summary,q)}</span></span>
    <span class="tag ${l.type}">${typeLabel(l.type)}</span></a>`;
}
function secRowHTML(s,q){
  const pages = s.p[0]===s.p[1] ? ('p'+s.p[0]) : ('p'+s.p[0]+'–'+s.p[1]);
  return `<a class="row" href="#/section/${s.id}">
    <span class="chip S">${s.id}</span>
    <span class="body"><span class="ttl">${hi(s.title,q)} <span style="font-family:var(--han);color:var(--muted);font-weight:500;font-size:13px">${esc(s.zh)}</span></span>
      <span class="sub">${hi(s.summary,q)}</span></span>
    <span class="tag src">${pages}</span></a>`;
}

function matchLesson(l,q){const s=q.toLowerCase();return l.id.toLowerCase().includes(s)||l.title.toLowerCase().includes(s)||l.summary.toLowerCase().includes(s);}
function matchSection(x,q){const s=q.toLowerCase();return x.id.toLowerCase().includes(s)||x.title.toLowerCase().includes(s)||x.zh.includes(q)||x.summary.toLowerCase().includes(s);}
function termMatches(q){
  const s=q.toLowerCase(), out=[];
  LESSONS.forEach(l=>l.gloss.forEach(g=>{if(g[0].toLowerCase().includes(s)||g[1].includes(q)||g[2].toLowerCase().includes(s))
    out.push({en:g[0],zh:g[1],def:g[2],loc:l.id,href:'#/lesson/'+l.id,cls:l.type[0].toUpperCase(),col:l.type});}));
  SECTIONS.forEach(x=>x.gloss.forEach(g=>{if(g[0].toLowerCase().includes(s)||g[1].includes(q)||g[2].toLowerCase().includes(s))
    out.push({en:g[0],zh:g[1],def:g[2],loc:x.id,href:'#/section/'+x.id,cls:'S',col:'source'});}));
  return out;
}

function renderList(){
  const q=state.query.trim();
  let html='';
  if(q){
    const terms=termMatches(q);
    if(terms.length){
      html+=`<div class="termhead">Glossary matches · 術語比對 (${terms.length})</div><div class="terms">`;
      terms.slice(0,60).forEach(t=>{html+=`<a class="term" href="${t.href}">
        <span><span class="en">${hi(t.en,q)}</span><span class="zh">${hi(t.zh,q)}</span><div class="def">${hi(t.def,q)}</div></span>
        <span class="loc" style="color:var(--${t.col})">${t.loc}</span></a>`;});
      html+=`</div>`;
    }
    const ls=LESSONS.filter(l=>matchLesson(l,q));
    html+=`<div class="termhead">Lessons · 課程 (${ls.length})</div>`;
    html+= ls.length? `<div class="rows">${ls.map(l=>rowHTML(l,q)).join('')}</div>` : `<div class="empty">No lessons match “${esc(q)}”.</div>`;
    const xs=SECTIONS.filter(x=>matchSection(x,q));
    html+=`<div class="termhead" style="margin-top:26px">PPT sections · 簡報章節 (${xs.length})</div>`;
    html+= xs.length? `<div class="rows">${xs.map(x=>secRowHTML(x,q)).join('')}</div>` : `<div class="empty">No sections match “${esc(q)}”.</div>`;
    if(!terms.length&&!ls.length&&!xs.length){
      html=`<div class="empty">Nothing found for “${esc(q)}”.<br>Try “resin”, “LPS”, “exotherm”, or a Chinese term like “樹脂”.</div>`;
    }
    document.getElementById('list').innerHTML=html; return;
  }

  if(state.mode==='day'){
    for(let d=1;d<=10;d++){
      const ls=LESSONS.filter(l=>l.day===d);
      const nT=ls.filter(l=>l.type==='theory').length, nP=ls.filter(l=>l.type==='practical').length;
      html+=`<div class="group"><span class="idx">DAY ${d}</span><h2>${esc(DAY_TITLES[d][0])}</h2>
        <span class="zh">${esc(DAY_TITLES[d][1])}</span><span class="meta">${nT}T · ${nP}P</span></div>
        <div class="rows">${ls.map(l=>rowHTML(l,'')).join('')}</div>`;
    }
  }else if(state.mode==='type'){
    ['theory','practical'].forEach(tp=>{
      const ls=LESSONS.filter(l=>l.type===tp);
      html+=`<div class="group ${tp}"><span class="idx">${tp==='theory'?'THEORY':'PRACTICAL'}</span>
        <h2>${tp==='theory'?'Classroom lessons':'Workshop lessons'}</h2>
        <span class="zh">${tp==='theory'?'理論課程':'實作課程'}</span><span class="meta">${ls.length} lessons</span></div>
        <div class="rows">${ls.map(l=>rowHTML(l,'')).join('')}</div>`;
    });
  }else{ /* ppt */
    html+=`<div class="group"><span class="idx" style="color:var(--source);border-color:#d4dfbf">PPT ORDER</span>
      <h2>As the training deck is organised</h2><span class="zh">依原簡報章節順序</span>
      <span class="meta">187 pp · §1–15</span></div>
      <div class="rows">${SECTIONS.map(s=>secRowHTML(s,'')).join('')}</div>`;
  }
  document.getElementById('list').innerHTML=html;
}

function renderHome(){
  renderCtxHome();
  const intro = state.mode==='ppt'
   ? `<div class="lede"><h1>The deck, section by section</h1>
       <p>The training PPT is organised by GWO syllabus element, not day by day — so one section can feed several lessons. Each section lists the pages it covers and the lessons it maps to. Every page of the 187-page deck lives in one of these fifteen sections.</p></div>`
   : `<div class="lede"><h1>10-day blade repair, one tap away</h1>
       <p>Every theory and practical lesson with a bilingual glossary, a one-line brief, and eight anticipated questions each way — plus the PPT sections they come from. Built for live consecutive interpreting.</p></div>`;
  view.innerHTML=intro+`<div id="list"></div>`;
  renderList(); view.focus();
}

/* -------- lesson detail -------- */
function detailLessonHTML(l){
  const glossRows=l.gloss.map(g=>`<tr><td class="en">${esc(g[0])}</td><td class="zh">${esc(g[1])}</td><td class="def">${esc(g[2])}</td></tr>`).join('');
  const qList=arr=>arr.map(q=>`<li>${esc(q[0])}<span class="zh">${esc(q[1])}</span></li>`).join('');
  const srcPills=(l.src||[]).map(sid=>{const s=secById[sid];return `<a class="pill S" href="#/section/${sid}">${sid}<span class="nm">${esc(s?s.title:'')}</span></a>`;}).join('');
  const i=ORDER.indexOf(l.id);
  const prev=i>0?byId[ORDER[i-1]]:null, next=i<ORDER.length-1?byId[ORDER[i+1]]:null;
  return `<article>
    <div class="detail-head">
      <div class="kicker">
        <span class="chip ${l.type[0].toUpperCase()}">${l.id}</span>
        <span class="day">Day ${l.day}</span>
        <span class="day" style="color:var(--${l.type});border-color:var(--${l.type})">${typeLabel(l.type)} · ${zhType(l.type)}</span>
      </div>
      <h1>${esc(l.title)}</h1>
      <p class="summary">${esc(l.summary)}</p>
      <div class="xref"><span class="lbl">PPT source</span>${srcPills||'<span style="font-size:13px;color:var(--muted)">—</span>'}</div>
    </div>
    <section class="block"><h3>Glossary <span class="zh">術語對照</span></h3>
      <table class="gloss"><thead><tr><th>English</th><th>繁體中文</th><th>Context</th></tr></thead><tbody>${glossRows}</tbody></table></section>
    <section class="block"><h3>Anticipated Q&amp;A <span class="zh">預期問答</span></h3>
      <div class="qa-grid">
        <div class="qcard ask"><h4><span class="dir">INSTR → TRAINEE</span></h4><p class="zhlead">講師可能問學員</p><ol>${qList(l.ask)}</ol></div>
        <div class="qcard get"><h4><span class="dir">TRAINEE → INSTR</span></h4><p class="zhlead">學員可能問講師</p><ol>${qList(l.get)}</ol></div>
      </div></section>
    <nav class="prevnext">
      <a class="pn prev ${prev?'':'disabled'}" href="${prev?'#/lesson/'+prev.id:'#'}"><div class="lbl">← Prev${prev?' · '+prev.id:''}</div><div class="nm">${prev?esc(prev.title):'—'}</div></a>
      <a class="pn next ${next?'':'disabled'}" href="${next?'#/lesson/'+next.id:'#'}"><div class="lbl">Next${next?' · '+next.id:''} →</div><div class="nm">${next?esc(next.title):'—'}</div></a>
    </nav></article>`;
}

/* -------- section detail -------- */
function detailSectionHTML(s){
  const pages = s.p[0]===s.p[1] ? ('p'+s.p[0]) : ('pp '+s.p[0]+'–'+s.p[1]);
  const glossRows=s.gloss.map(g=>`<tr><td class="en">${esc(g[0])}</td><td class="zh">${esc(g[1])}</td><td class="def">${esc(g[2])}</td></tr>`).join('');
  const relPills=(s.rel||[]).map(id=>{const l=byId[id];return `<a class="pill ${l.type[0].toUpperCase()}" href="#/lesson/${id}">${id}<span class="nm">${esc(l?l.title:'')}</span></a>`;}).join('');
  const i=SECTIONS.findIndex(x=>x.id===s.id);
  const prev=i>0?SECTIONS[i-1]:null, next=i<SECTIONS.length-1?SECTIONS[i+1]:null;
  return `<article>
    <div class="detail-head">
      <div class="kicker">
        <span class="chip S">${s.id}</span>
        <span class="day" style="color:var(--source);border-color:var(--source)">${pages}</span>
        <span class="day" style="font-family:var(--han)">${esc(s.zh)}</span>
      </div>
      <h1>${esc(s.title)}</h1>
      <p class="summary">${esc(s.summary)}</p>
      <div class="xref"><span class="lbl">Covers lessons</span>${relPills||'<span style="font-size:13px;color:var(--muted)">—</span>'}</div>
    </div>
    <section class="block"><h3>Glossary <span class="zh">術語對照</span></h3>
      <table class="gloss"><thead><tr><th>English</th><th>繁體中文</th><th>Context</th></tr></thead><tbody>${glossRows}</tbody></table></section>
    <nav class="prevnext">
      <a class="pn prev ${prev?'':'disabled'}" href="${prev?'#/section/'+prev.id:'#'}"><div class="lbl">← Prev${prev?' · '+prev.id:''}</div><div class="nm">${prev?esc(prev.title):'—'}</div></a>
      <a class="pn next ${next?'':'disabled'}" href="${next?'#/section/'+next.id:'#'}"><div class="lbl">Next${next?' · '+next.id:''} →</div><div class="nm">${next?esc(next.title):'—'}</div></a>
    </nav></article>`;
}

function renderLesson(id){const l=byId[id];if(!l){location.hash=backHash();return;}renderCtxDetailLesson(l);view.innerHTML=detailLessonHTML(l);view.focus();window.scrollTo({top:0,behavior:'auto'});}
function renderSection(id){const s=secById[id];if(!s){location.hash='#/ppt';return;}renderCtxDetailSection(s);view.innerHTML=detailSectionHTML(s);view.focus();window.scrollTo({top:0,behavior:'auto'});}

/* -------- router -------- */
function route(){
  const h=location.hash||'#/day';
  let m=h.match(/^#\/lesson\/([TP]\d+)/i); if(m){renderLesson(m[1].toUpperCase());return;}
  m=h.match(/^#\/section\/(S\d+)/i); if(m){renderSection(m[1].toUpperCase());return;}
  if(h==='#/type')state.mode='type'; else if(h==='#/ppt')state.mode='ppt'; else state.mode='day';
  renderHome();
}
window.addEventListener('hashchange',route);

document.getElementById('footnote').innerHTML =
  `<div>39 lessons (19 theory / 20 practical) · 15 PPT sections spanning all 187 pages of the GWO Blade Repair V5.0 deck. Every question is shown in English and Traditional Chinese.</div>`+
  `<div class="han">術語中譯以原簡報用字為準；原簡報未提供中文者採業界標準譯法。所有摘要與問答供口譯準備參考。「依 PPT」檢視涵蓋簡報全部 187 頁。</div>`;

route();
</script>
</body>
</html>
